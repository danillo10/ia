name: Deploy backend (Railway CLI)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "railway.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli@4.59.0

      - name: Deploy serviço minutask-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway redeploy \
            --service b00f1f12-67b3-4d16-b699-15f0d9cbbbbf \
            --yes
