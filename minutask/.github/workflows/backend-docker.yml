name: Build backend (GHCR)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/danillo10/minutask-backend:latest
            ghcr.io/danillo10/minutask-backend:${{ github.sha }}
